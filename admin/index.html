<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — BCP HOLDING</title>
  <style>
    /* Custom login page */
    [data-testid="login-page"],
    .notif__container + div {
      background: #0a0a12 !important;
    }

    /* Login button */
    [data-testid="login-button"] {
      background: #7C3AED !important;
      border-radius: 12px !important;
      padding: 14px 32px !important;
      font-weight: 700 !important;
      font-size: 15px !important;
      transition: background 0.2s !important;
    }
    [data-testid="login-button"]:hover {
      background: #6D28D9 !important;
    }

    /* Replace Decap logo with BCP HOLDING branding */
    [data-testid="login-page"] img,
    [data-testid="login-page"] svg {
      display: none !important;
    }
    [data-testid="login-page"]::before {
      content: '';
      display: block;
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background-image: url('/favicon.svg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    [data-testid="login-page"]::after {
      content: 'BCP HOLDING';
      display: block;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    /* Active sidebar link */
    [class*="SidebarContainer"] [class*="active"] {
      color: #7C3AED !important;
      border-color: #7C3AED !important;
    }

    /* Publish button */
    [class*="PublishButton"] {
      background: #7C3AED !important;
      border-radius: 8px !important;
    }

    /* General polish */
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
  <script>
  // Auto-generate slug from title when id field is empty
  var slugify = function(text) {
    return text.toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .substring(0, 80);
  };

  if (window.CMS) {
    CMS.registerEventListener({
      name: 'preSave',
      handler: function(ref) {
        var entry = ref.entry;
        var data = entry.get('data');
        if (!data) return;

        var items = data.get('items');
        if (!items) return;

        var updated = items.map(function(item) {
          var id = item.get('id');
          var title = item.get('title');
          if ((!id || id === '') && title) {
            return item.set('id', slugify(title));
          }
          return item;
        });

        return data.set('items', updated);
      }
    });
  }
  </script>
</body>
</html>
